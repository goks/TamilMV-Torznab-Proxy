name: Publish Docker image to GHCR

on:
  push:
    branches: ['**']

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Bump patch version, commit and tag (skip CI)
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm --no-git-tag-version version patch
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json 2>/dev/null || true
          git commit -m "chore(release): $VERSION [skip ci]" || echo "no changes to commit"
          git tag -f "v$VERSION" || true
          git push origin HEAD --tags
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.bump.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:cache
          cache-to: type=inline
