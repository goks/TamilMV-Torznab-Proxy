name: Docker Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker build --tag tamilmv-proxy:ci .

      - name: Run container
        run: |
          docker run -d --name tamilmv-proxy-ci -p 5000:5000 tamilmv-proxy:ci

      - name: Wait for server
        run: |
          for i in {1..20}; do
            if curl -sSf http://127.0.0.1:5000/api?t=caps >/dev/null; then
              echo "Server is up"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in time"
          docker logs tamilmv-proxy-ci || true
          exit 1

      - name: Smoke test Torznab caps endpoint
        run: |
          curl -sSf http://127.0.0.1:5000/api?t=caps | grep -q "<caps>"

      - name: Stop container
        if: always()
        run: |
          docker stop tamilmv-proxy-ci || true
          docker rm tamilmv-proxy-ci || true
