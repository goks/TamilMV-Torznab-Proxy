version: '3.8'

services:
  tamilmv-proxy:
    build: .
    image: "ghcr.io/goks/tamilmv-torznab-proxy:latest"
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: any
        delay: 5m
        max_attempts: 0
